    <script>
        let allScannedImages = []; 
        let globalImagesToShow = []; 
        let currentLbIndex = 0;
        let currentSizeFilter = 'all', currentTypeFilter = 'all';

        // --- ระบบแจ้งเตือนปุ่ม UI ---
        function showTempSuccess(btnId, tempHtml, originalHtml, time = 2500) {
            const btn = document.getElementById(btnId);
            if(!btn) return;
            btn.innerHTML = tempHtml;
            btn.style.borderColor = '#0f0';
            btn.style.color = '#0f0';
            setTimeout(() => { btn.innerHTML = originalHtml; btn.style.borderColor = ''; btn.style.color = ''; }, time);
        }

        function showTempIcon(btn, tempIconClass, origIconClass) {
            const icon = btn.querySelector('i');
            if(icon) {
                icon.className = tempIconClass;
                btn.style.background = '#28a745';
                setTimeout(() => {
                    icon.className = origIconClass;
                    btn.style.background = '';
                }, 2000);
            }
        }

        function switchTab(mode) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.input-section').forEach(s => s.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${mode}')"]`).classList.add('active');
            document.getElementById(`tab-${mode}`).classList.add('active');
        }

        // --- ระบบฟิลเตอร์ (กรองรูป) ---
        function setSizeFilter(size, btn) {
            currentSizeFilter = size;
            document.querySelectorAll('#sizeFilters .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyVisualFilters();
        }

        function setTypeFilter(type, btn) {
            currentTypeFilter = type;
            document.querySelectorAll('#typeFilters .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGallery();
        }

        function applyVisualFilters() {
            const cards = document.querySelectorAll('.img-card');
            cards.forEach(card => {
                const width = parseInt(card.getAttribute('data-width') || 0);
                let show = true;
                if (currentSizeFilter === 'small' && width >= 500) show = false;
                if (currentSizeFilter === 'medium' && (width < 500 || width > 1200)) show = false;
                if (currentSizeFilter === 'large' && width <= 1200) show = false;
                
                if (show) card.classList.remove('hidden-by-filter');
                else card.classList.add('hidden-by-filter');
            });
            updateStatusText();
        }

        function updateStatusText() {
            const visibleCards = document.querySelectorAll('.img-card:not(.hidden-by-filter)');
            document.getElementById('status').innerText = `พบทั้งหมด ${visibleCards.length} รูป (พร้อมดาวน์โหลด)`;
        }

        function checkFileType(url, filter) {
            const u = url.toLowerCase().split('?')[0];
            if (u.endsWith('.js') || u.endsWith('.css') || u.endsWith('.html') || u.endsWith('.php')) return false;
            if (filter === 'all') return true; 
            if (filter === 'jpg' && (u.endsWith('.jpg') || u.endsWith('.jpeg'))) return true;
            if (filter === 'png' && u.endsWith('.png')) return true;
            if (filter === 'gif' && u.endsWith('.gif')) return true;
            if (filter === 'webp' && u.endsWith('.webp')) return true;
            if (filter === 'svg' && u.endsWith('.svg')) return true;
            return false;
        }

        // --- Core Engine: ตัวเจาะหาลิงก์แบบลึกขั้นสุด (Deep Scan) ---
        function extractImagesFromHtml(html, baseUrl) {
            let foundRaw = new Set(); 
            
            // Regex 1: หาลิงก์รูปภาพในหน้าเว็บและใน JSON/Script (ทะลุ .js)
            const urlRegex = /(?:https?:)?\/\/[^"'\s<>;&]+\.(?:jpg|jpeg|png|gif|webp|svg|ico|bmp|tiff)(?:\?[^"'\s<>]*)?/gi;
            let match;
            while ((match = urlRegex.exec(html)) !== null) foundRaw.add(match[0]);
            
            // Regex 2: ใช้ DOM Parse ทะลวงโครงสร้างแท็กต่างๆ
            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                doc.querySelectorAll('*').forEach(el => {
                    ['src', 'data-src', 'data-original', 'data-lazy-src', 'data-srcset', 'href', 'srcset', 'imagesrcset', 'content'].forEach(attr => {
                        let val = el.getAttribute(attr);
                        if (val) {
                            if (val.includes(',') && attr.includes('set')) {
                                val.split(',').forEach(p => foundRaw.add(p.trim().split(/\s+/)[0]));
                            } else {
                                foundRaw.add(val);
                            }
                        }
                    });
                    // ควานหาพื้นหลัง CSS
                    let style = el.getAttribute('style');
                    if (style && style.includes('url(')) {
                        let m = style.match(/url\(['"]?([^'"()]+)['"]?\)/);
                        if (m) foundRaw.add(m[1]);
                    }
                });
            } catch(e){}

            let finalUrls = [];
            foundRaw.forEach(url => {
                if (!url || url.startsWith('data:')) return;
                try {
                    // แก้บัคลิงก์จาก JSON ที่มี \u002F
                    url = url.trim().replace(/\\u002F/g, '/');
                    if (url.includes('%')) try { url = decodeURIComponent(url); } catch(e){}
                    
                    // แปลง Relative URL ให้เป็น Full URL แบบชาญฉลาด
                    if (url.startsWith('//')) url = 'https:' + url;
                    else if (url.startsWith('/')) { 
                        if(baseUrl) url = new URL(url, new URL(baseUrl).origin).href; 
                    }
                    else if (!url.startsWith('http')) {
                        if(baseUrl) {
                            let base = baseUrl.endsWith('/') ? baseUrl : baseUrl.substring(0, baseUrl.lastIndexOf('/') + 1);
                            url = new URL(url, base).href;
                        }
                    }

                    // เจาะลิงก์ที่โดน Redirect ครอบไว้
                    if (url.includes('url=')) {
                        try {
                            let dummy = new URL(url, 'http://d');
                            let inner = dummy.searchParams.get('url');
                            if (inner) url = inner;
                        } catch(e){}
                    }

                    const uL = url.toLowerCase().split('?')[0];
                    if (uL.match(/\.(jpg|jpeg|png|webp|gif|svg|tiff|heic|ico)$/i)) {
                        finalUrls.push(url);
                    }
                } catch(e) {}
            });
            return finalUrls;
        }

        // --- ระบบ Proxy ขั้นสูง (สลับเซิร์ฟเวอร์อัตโนมัติ) ---
        async function fetchHtmlSafe(url) {
            const proxies = [
                'https://api.codetabs.com/v1/proxy?quest=', 
                'https://corsproxy.io/?',
                'https://api.allorigins.win/raw?url='
            ];
            for (let p of proxies) {
                try {
                    const res = await fetch(p + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
                    if (res.ok) return await res.text();
                } catch(e) {}
            }
            throw new Error("Blocked");
        }

        async function fetchImageSafe(url) {
            const proxies = ['', 'https://api.codetabs.com/v1/proxy?quest=', 'https://corsproxy.io/?'];
            for (let px of proxies) {
                try {
                    const res = await fetch(px ? px + encodeURIComponent(url) : url, { signal: AbortSignal.timeout(6000) });
                    if (res.ok) { let b = await res.blob(); if(b.size > 150) return b; }
                } catch (e) {}
            }
            return null;
        }

        async function startAutoScan() {
            const url = document.getElementById('targetUrl').value;
            if (!url) return alert('กรุณาใส่ลิงก์เว็บไซต์');
            runScan(url, async () => await fetchHtmlSafe(url));
        }

        function startManualScan() {
            const url = document.getElementById('manualUrl').value;
            const code = document.getElementById('sourceCode').value;
            if (!code) return alert('กรุณาวาง Source Code HTML');
            runScan(url, async () => code);
        }

        async function runScan(baseUrl, fetcher) {
            document.getElementById('gallery').innerHTML = '';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('status').innerText = "กำลังเจาะทะลวงระบบและดึงข้อมูล...";
            try {
                const html = await fetcher();
                allScannedImages = extractImagesFromHtml(html, baseUrl);
                renderGallery();
            } catch (e) {
                document.getElementById('status').innerHTML = "❌ ล้มเหลว: เว็บมีการป้องกันสูงมาก<br>👉 แนะนำให้ใช้โหมด Manual Code หรือใช้ Bookmarklet แทนครับ";
            }
            document.getElementById('loader').style.display = 'none';
        }

        function getCleanKey(urlStr) {
            try { let u = urlStr.split('?')[0]; return u.replace(/[-_]\d+x\d+(?=\.[a-zA-Z0-9]+$)/i, ''); } catch(e) { return urlStr; }
        }

        function getResolutionScore(urlStr) {
            try { let m = urlStr.split('?')[0].match(/[-_](\d+)x(\d+)(?=\.[a-zA-Z0-9]+$)/i); return m ? parseInt(m[1])*parseInt(m[2]) : 0; } catch(e) { return 0; }
        }

        // --- ระบบจัดการแกลเลอรี ---
        function renderGallery() {
            const gallery = document.getElementById('gallery');
            const allowDupes = document.getElementById('allowDuplicates').checked; 
            gallery.innerHTML = '';
            
            if (allowDupes) globalImagesToShow = [...new Set(allScannedImages)]; 
            else {
                let uMap = new Map();
                allScannedImages.forEach(url => {
                    let k = getCleanKey(url);
                    let ex = uMap.get(k);
                    if (!ex || getResolutionScore(url) > getResolutionScore(ex)) uMap.set(k, url);
                });
                globalImagesToShow = Array.from(uMap.values());
            }

            globalImagesToShow = globalImagesToShow.filter(url => checkFileType(url, currentTypeFilter));
            
            globalImagesToShow.forEach((src, idx) => {
                const card = document.createElement('div');
                card.className = 'img-card';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'card-checkbox chk-select';
                checkbox.checked = true;
                checkbox.setAttribute('data-url', src);

                const imgContainer = document.createElement('div');
                imgContainer.className = 'img-container';
                imgContainer.onclick = () => openLightbox(idx);

                const img = document.createElement('img');
                img.src = src; img.loading = "lazy";
                img.onerror = function() {
                    if(!this.retried) { this.retried = true; this.src = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(src); }
                    else { card.style.display = 'none'; }
                };
                img.onload = function() {
                    card.setAttribute('data-width', this.naturalWidth);
                    applyVisualFilters();
                    let raw = src.split('/').pop().split(/[#?]/)[0];
                    let fname = raw; try{ fname = decodeURIComponent(raw); }catch(e){}
                    if(fname.length > 15) fname = fname.substring(0, 15) + '...';
                    info.innerHTML = `<span class="name">${fname}</span><span class="meta">${this.naturalWidth}x${this.naturalHeight}</span>`;
                };

                const info = document.createElement('div');
                info.className = 'img-info';
                const actions = document.createElement('div');
                actions.className = 'img-actions';
                
                // ปุ่ม Action ด้านล่างรูป
                actions.innerHTML = `
                    <button class="btn-icon btn-dl" title="โหลดภาพ" onclick="downloadSingle('${src}', this)"><i class="fas fa-download"></i></button>
                    <button class="btn-icon btn-copy-link" title="ก็อปปี้ลิงก์" onclick="copyText('${src}', this)"><i class="fas fa-link"></i></button>
                    <button class="btn-icon btn-copy-img" title="ก็อปปี้รูป" onclick="copyImageToClipboard('${src}', this)"><i class="fas fa-copy"></i></button>
                `;

                imgContainer.appendChild(img);
                card.append(checkbox, imgContainer, info, actions);
                gallery.appendChild(card);
            });
            updateStatusText();
        }

        // --- ระบบดาวน์โหลด & Copy สุดแกร่ง ---
        async function downloadSingle(url, btnElement) {
            let blob = await fetchImageSafe(url);
            if(blob) {
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `KIRITO_${Date.now()}.jpg`; a.click();
                if(btnElement) showTempIcon(btnElement, 'fas fa-check', 'fas fa-download');
            } else window.open(url, '_blank');
        }

        function copyText(txt, btnElement) {
            const t = document.createElement("textarea"); t.value = txt; 
            t.style.position = 'fixed'; t.style.left = '-9999px';
            document.body.appendChild(t); t.select();
            try { 
                document.execCommand('copy'); 
                if(btnElement) showTempIcon(btnElement, 'fas fa-check', 'fas fa-link');
            } catch(e){} document.body.removeChild(t);
        }
        
        async function copyImageToClipboard(url, btnElement) {
            try {
                if (!navigator.clipboard || !navigator.clipboard.write) throw new Error("Blocked");
                let blob = await fetchImageSafe(url);
                if(blob) {
                    await navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
                    if(btnElement) showTempIcon(btnElement, 'fas fa-check', 'fas fa-copy');
                }
            } catch (e) { alert("เบราว์เซอร์ไม่รองรับการคัดลอกรูปภาพโดยตรง กรุณาใช้ปุ่มโหลดแทน"); }
        }

        let isAllSelected = true;
        function selectAllImages() {
            isAllSelected = !isAllSelected;
            document.querySelectorAll('.chk-select').forEach(cb => cb.checked = isAllSelected);
        }

        function clearGallery() {
            if(confirm("ยืนยันการล้างข้อมูลทั้งหมดบนหน้าจอ?")) {
                document.getElementById('gallery').innerHTML = '';
                allScannedImages = []; globalImagesToShow = []; updateStatusText();
            }
        }

        async function downloadAll() {
            const checkedBoxes = Array.from(document.querySelectorAll('.chk-select:checked'));
            if(checkedBoxes.length === 0) return alert('กรุณาเลือกรูปภาพอย่างน้อย 1 รูป');

            const images = checkedBoxes.map(cb => cb.getAttribute('data-url'));
            const btn = document.getElementById('btn-dl-all');
            const originalText = btn.innerHTML;
            const progBar = document.getElementById('progress-bar');
            
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> PREPARING ZIP...`;
            btn.style.pointerEvents = 'none';
            document.getElementById('progress-container').style.display = 'block';
            progBar.style.width = '0%';

            try {
                const zip = new JSZip();
                let successCount = 0;

                const worker = async (url, idx) => {
                    let blob = await fetchImageSafe(url);
                    if (blob) {
                        let fname = url.split('/').pop().split(/[#?]/)[0];
                        try { fname = decodeURIComponent(fname); } catch(e){}
                        let ext = fname.split('.').pop().toLowerCase();
                        if(ext.length > 4 || !ext) ext = 'jpg';
                        zip.file(`KIRITO_${Date.now()}_${idx.toString().padStart(3,'0')}.${ext}`, blob);
                        successCount++;
                    }
                    let pct = Math.round((successCount / images.length) * 100);
                    progBar.style.width = pct + '%';
                    progBar.innerText = `บรรจุไฟล์: ${successCount} / ${images.length} (${pct}%)`;
                };

                // จำกัดความเร็วโหลดพร้อมกัน 10 ไฟล์เพื่อกันเน็ตตัด
                for (let i = 0; i < images.length; i += 10) {
                    const chunk = images.slice(i, i + 10);
                    await Promise.all(chunk.map((url, idx) => worker(url, i + idx)));
                }

                if(successCount > 0) {
                    progBar.innerText = 'กำลังสร้างไฟล์ ZIP...';
                    const content = await zip.generateAsync({type:"blob"});
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(content); a.download = `KIRITO_PACK_${Date.now()}.zip`; a.click();
                    showTempSuccess('btn-dl-all', `<i class="fas fa-check"></i> สำเร็จ (${successCount} รูป)`, originalText, 4000);
                } else alert('โดนระบบป้องกันบล็อกการดาวน์โหลดทั้งหมด');
                
            } catch(e) { alert('ZIP ERROR: มีปัญหาขัดข้องขณะแพ็กไฟล์'); }

            setTimeout(() => { document.getElementById('progress-container').style.display = 'none'; }, 2000);
            btn.innerHTML = originalText; btn.style.pointerEvents = 'auto';
        }

        function copyMobileCode() {
            const shortCode = `javascript:(function(){var s=document.createElement('script');s.src='https://prthachnu999.github.io/My-Personal-Space/kiritopull.js?v='+Date.now();document.body.appendChild(s);})();`;
            const t = document.createElement("textarea"); t.value = shortCode; 
            t.style.position = 'fixed'; t.style.left = '-9999px';
            document.body.appendChild(t); t.select();
            try { 
                document.execCommand('copy'); 
                showTempSuccess('btn-copy-mobile', '<i class="fas fa-check"></i> คัดลอกแล้ว นำไปวางแก้ในบุคมาร์กได้เลย', '<i class="fas fa-mobile-alt"></i> คัดลอก Loader Code (สำหรับมือถือ)', 4000);
            } catch (err) {}
            document.body.removeChild(t);
        }

        // ==========================================
        // SMART TOUCH 2.0 (แก้บัครูปลอย + ระบบปัดสุดสมูท)
        // ==========================================
        let scale = 1, isDragging = false, startX, startY, tx = 0, ty = 0;
        let initialPinchDist = null, initialPinchScale = 1;
        let startTouchX = 0, isSwiping = false;
        const lbImg = document.getElementById('lb-img');
        const lightbox = document.getElementById('lightbox');

        function openLightbox(index) {
            currentLbIndex = index;
            lbImg.src = globalImagesToShow[index];
            lightbox.style.display = 'flex';
            scale = 1; tx = 0; ty = 0; 
            updateTransform();
        }

        function closeLightbox() { lightbox.style.display = 'none'; }
        
        function navLb(dir) {
            currentLbIndex += dir;
            if(currentLbIndex < 0) currentLbIndex = globalImagesToShow.length - 1;
            if(currentLbIndex >= globalImagesToShow.length) currentLbIndex = 0;
            openLightbox(currentLbIndex);
        }

        function updateTransform() { 
            // แก้บัครูปลอย: ถ้าขนาดปกติ (หรือต่ำกว่า) ให้จัดเข้าตรงกลางทันที
            if(scale <= 1) { scale = 1; tx = 0; ty = 0; }
            lbImg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`; 
        }
        
        // --- เมาส์ (PC) ---
        lbImg.addEventListener('wheel', (e) => {
            e.preventDefault(); 
            scale += (e.deltaY * -0.002); 
            updateTransform();
        }, { passive: false });

        lbImg.addEventListener('mousedown', (e) => {
            e.preventDefault(); 
            if(scale > 1) {
                isDragging = true; 
                startX = e.clientX - tx; 
                startY = e.clientY - ty; 
                lbImg.classList.add('grabbing');
            } else {
                startTouchX = e.clientX; 
                isSwiping = true;
            }
        });

        lightbox.addEventListener('mouseup', (e) => { 
            isDragging = false; 
            lbImg.classList.remove('grabbing'); 
            
            // ปัดเปลี่ยนรูปด้วยเมาส์
            if(scale === 1 && isSwiping) {
                let diffX = e.clientX - startTouchX;
                if(diffX < -60) navLb(1); 
                else if(diffX > 60) navLb(-1);
                isSwiping = false;
            }
        });

        lightbox.addEventListener('mousemove', (e) => {
            if (!isDragging || scale <= 1) return;
            e.preventDefault();
            tx = e.clientX - startX;
            ty = e.clientY - startY;
            updateTransform();
        });

        // --- ทัชสกรีน (มือถือ) ---
        const getDist = (touches) => Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY);

        lbImg.addEventListener('touchstart', (e) => {
            if(e.touches.length === 2) {
                e.preventDefault();
                isDragging = false;
                isSwiping = false;
                initialPinchDist = getDist(e.touches);
                initialPinchScale = scale;
            } else if(e.touches.length === 1) {
                if(scale > 1) {
                    // โหมดลาก (Pan) เมื่อรูปซูมอยู่
                    isDragging = true;
                    isSwiping = false;
                    startX = e.touches[0].clientX - tx;
                    startY = e.touches[0].clientY - ty;
                } else {
                    // โหมดเตรียมปัด (Swipe) เมื่อรูปขนาดปกติ
                    startTouchX = e.touches[0].clientX;
                    isSwiping = true;
                    isDragging = false;
                }
            }
        }, { passive: false });

        lightbox.addEventListener('touchmove', (e) => {
            if(e.touches.length === 2 && initialPinchDist) {
                // โหมดซูม
                e.preventDefault();
                const currentDist = getDist(e.touches);
                scale = initialPinchScale * (currentDist / initialPinchDist);
                updateTransform();
            } else if (e.touches.length === 1) {
                if (scale > 1 && isDragging) {
                    // โหมดลาก (ขยับพิกัด)
                    e.preventDefault();
                    tx = e.touches[0].clientX - startX;
                    ty = e.touches[0].clientY - startY;
                    updateTransform();
                } else if (scale === 1 && isSwiping) {
                    // โหมดปัด (บล็อกการเลื่อนหน้าจอ)
                    e.preventDefault(); 
                }
            }
        }, { passive: false });

        lightbox.addEventListener('touchend', (e) => {
            if(e.touches.length < 2) initialPinchDist = null;
            if(e.touches.length === 0) {
                if (scale === 1 && isSwiping) {
                    // ประมวลผลการปัดเปลี่ยนรูปเมื่อยกนิ้ว
                    let diffX = e.changedTouches[0].clientX - startTouchX;
                    if(diffX < -50) navLb(1); 
                    else if(diffX > 50) navLb(-1);
                }
                isDragging = false;
                isSwiping = false;
            }
        });
        
        document.getElementById('allowDuplicates').addEventListener('change', renderGallery);
    </script>
